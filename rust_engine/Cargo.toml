[package]
name = "spectrum_engine"
version = "0.1.0"
edition = "2021"

[lib]
name = "spectrum_engine"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.27", features = ["extension-module", "abi3-py38"] }
numpy = "0.27"
crossbeam-channel = "0.5"

[dependencies.windows]
version = "0.52"
features = ["Win32_Foundation"]

[build-dependencies]
cc = "1.0"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1